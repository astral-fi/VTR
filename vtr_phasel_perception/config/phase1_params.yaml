# Phase 1 - Perception Node Parameters

# Camera topics
left_image_topic:  "/camera/left/image_raw"
right_image_topic: "/camera/right/image_raw"

# OpenVINS output pose topic
openvins_pose_topic: "/ov_msckf/poseimu"

# DBoW2 vocabulary (download from ORB-SLAM2 or DBoW2 releases)
dbow2_vocab_path: "$(find vtr_phase1_perception)/vocab/ORBvoc.txt"

# FAST feature detector
fast_threshold:    25
fast_nms_radius:    7
fast_max_features: 600

# Keyframe selection
kf_frame_interval:          5
kf_translation_threshold:   0.30   # metres
kf_rotation_threshold_deg: 10.0
kf_min_tracked_features:   80
